name: CI

on:
  pull_request:
  push:
    branches-ignore: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    outputs:
      tests_failed: ${{ steps.run_tests.outputs.tests_failed }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: dotnet restore && dotnet build --no-restore --configuration Release

      - name: Run tests
        id: run_tests
        run: |
          set +e
          dotnet test --no-build --configuration Release -q 2>&1 | tee test.log
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "tests_failed=true" >> $GITHUB_OUTPUT
          else
            echo "tests_failed=false" >> $GITHUB_OUTPUT
          fi
          exit 0

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log

  auto-fix-on-failure:
    needs: tests
    # Only runs on direct pushes (not PRs) when tests fail
    if: needs.tests.outputs.tests_failed == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: dotnet restore && dotnet build --no-restore

      - name: Capture test failures
        run: |
          set +e
          dotnet test --no-build -q 2>&1 | tee test.log
          exit 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex auto-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT=$(cat .codex/commands/fix-tests.md)
          TEST_FAILURES=$(cat test.log)
          codex --approval-mode full-auto \
            --model o4-mini \
            "$PROMPT

          ## Current Test Failures
          \`\`\`
          $TEST_FAILURES
          \`\`\`
          "

      - name: Re-run tests (must be green)
        run: dotnet test --no-build -q

      - name: Commit & push fix
        run: |
          git config user.name "codex-autofix-bot"
          git config user.email "codex-autofix-bot@users.noreply.github.com"
          git add -A
          git commit -m "autofix: make CI green via Codex [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create PR if one does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "fix: Codex auto-fixed failing tests on \`$BRANCH\`" \
              --body "🤖 CI detected failing tests and Codex has applied a patch.

          All tests should now be passing — CI will re-run automatically.

          > Review the changes before merging."
            echo "PR created for $BRANCH"
          else
            echo "PR #$EXISTING already exists — patch pushed to branch."
          fi
