name: Codex Auto-fix

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (e.g., feature/break-ci)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: dotnet restore && dotnet build --no-restore

      - name: Run tests (capture log)
        run: |
          set +e
          dotnet test --no-build -q 2>&1 | tee test.log
          exit 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install openai SDK
        run: pip install openai

      - name: Run AI auto-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, re
          from openai import OpenAI

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          prompt_text = open(".codex/commands/fix-tests.md").read()
          test_failures = open("test.log").read()
          source_code   = open("src/MathUtils/MathCalculator.cs").read()

          system_msg = (
              "You are a C# expert. Fix ONLY the source file src/MathUtils/MathCalculator.cs "
              "so all tests pass. Do NOT modify any test files. "
              "Return ONLY a fenced code block with the corrected C# file content."
          )
          user_msg = f"""{prompt_text}

          ## Current Test Failures
          ```
          {test_failures}
          ```

          ## Source File: src/MathUtils/MathCalculator.cs
          ```csharp
          {source_code}
          ```
          """

          response = client.chat.completions.create(
              model="gpt-4o-mini",
              messages=[
                  {"role": "system", "content": system_msg},
                  {"role": "user",   "content": user_msg},
              ],
              max_tokens=1500,
          )

          reply = response.choices[0].message.content
          print("=== AI response ===")
          print(reply)

          match = re.search(r"```(?:csharp|cs)?\n(.*?)```", reply, re.DOTALL)
          if not match:
              raise RuntimeError("AI did not return a fenced code block")

          fixed = match.group(1)
          with open("src/MathUtils/MathCalculator.cs", "w") as f:
              f.write(fixed)
          print("=== Fixed file written ===")
          PYEOF

      - name: Re-run tests (must be green)
        run: dotnet test --verbosity quiet

      - name: Commit & push fix
        run: |
          git config user.name "codex-autofix-bot"
          git config user.email "codex-autofix-bot@users.noreply.github.com"
          git add -A
          git commit -m "autofix: make CI green via Codex [skip ci]" || exit 0
          git push origin HEAD:${{ inputs.branch }}
