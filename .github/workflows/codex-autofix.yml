name: Codex Auto-fix

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (e.g., feature/break-ci)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & build
        run: dotnet restore && dotnet build --no-restore

      - name: Run tests (capture log)
        run: |
          set +e
          dotnet test --no-build -q 2>&1 | tee test.log
          exit 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex (non-interactive)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT=$(cat .codex/commands/fix-tests.md)
          TEST_FAILURES=$(cat test.log)
          codex --approval-mode full-auto \
            --model o4-mini \
            "$PROMPT

          ## Current Test Failures
          \`\`\`
          $TEST_FAILURES
          \`\`\`
          "

      - name: Re-run tests (must be green)
        run: dotnet test --no-build -q

      - name: Commit & push fix
        run: |
          git config user.name "codex-autofix-bot"
          git config user.email "codex-autofix-bot@users.noreply.github.com"
          git add -A
          git commit -m "autofix: make CI green via Codex [skip ci]" || exit 0
          git push origin HEAD:${{ inputs.branch }}
